<!-- @dsCard group="Components" viewport="700x150" subtitle="Task and item states, tinted by meaning" name="StatusChip" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--paper); padding: 26px; }
  .bp-cluster { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .bp-cluster + .bp-cluster { margin-top: 16px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body class="bp">
<div id="root"></div>
<script type="text/babel">
  const __ns = (name) => { for (const k of Object.keys(window)) { try { const v = window[k]; if (v && typeof v === 'object' && v[name]) return v; } catch(e){} } return {}; };
  const { StatusChip } = __ns('StatusChip');
  ReactDOM.createRoot(document.getElementById('root')).render(
    <React.Fragment>
      <div className="bp-cluster">
        <StatusChip tone="ready">Ready</StatusChip>
        <StatusChip tone="waiting">Waiting 3 days</StatusChip>
        <StatusChip tone="blocked">Blocked</StatusChip>
      </div>
      <div className="bp-cluster">
        <StatusChip tone="to-list">To list</StatusChip>
        <StatusChip tone="listed">Listed</StatusChip>
        <StatusChip tone="sold">Sold</StatusChip>
        <StatusChip tone="donated">Donated</StatusChip>
      </div>
    </React.Fragment>
  );
</script>
</body>
</html>
