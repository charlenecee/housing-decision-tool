<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--paper); padding: 26px; }
  .bp-cluster { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .bp-cluster + .bp-cluster { margin-top: 18px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body class="bp">
<div id="root"></div>
<script type="text/babel">
  const __ns = (name) => { for (const k of Object.keys(window)) { try { const v = window[k]; if (v && typeof v === 'object' && v[name]) return v; } catch(e){} } return {}; };
  const { Button } = __ns('Button');
  const Plus = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
  );
  ReactDOM.createRoot(document.getElementById('root')).render(
    <React.Fragment>
      <div className="bp-cluster">
        <Button variant="primary">Save &amp; begin</Button>
        <Button variant="primary" iconLeft={<Plus />}>Add to my list</Button>
        <Button variant="primary" disabled>Save &amp; begin</Button>
      </div>
      <div className="bp-cluster">
        <Button variant="ghost">Cancel</Button>
        <Button variant="link" iconLeft={<Plus />}>Add a task</Button>
        <Button variant="link">Mark done</Button>
      </div>
    </React.Fragment>
  );
</script>
</body>
</html>
