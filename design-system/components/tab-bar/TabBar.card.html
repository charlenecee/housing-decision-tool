<!-- @dsCard group="Components" viewport="700x200" subtitle="Frosted bottom nav, active item in terracotta" name="TabBar" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--sand); padding: 26px; display: flex; justify-content: center; }
  .surface { width: 402px; background: var(--paper); border-radius: 20px; border: 1px solid var(--line-soft); box-shadow: var(--shadow-card); overflow: hidden; }
  .filler { height: 78px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-family: var(--font-sans); font-size: 13px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body class="bp">
<div id="root"></div>
<script type="text/babel">
  const __ns = (name) => { for (const k of Object.keys(window)) { try { const v = window[k]; if (v && typeof v === 'object' && v[name]) return v; } catch(e){} } return {}; };
  const { TabBar } = __ns('TabBar');
  const S = { fill: 'none', stroke: 'currentColor', strokeLinecap: 'round', strokeLinejoin: 'round' };
  const Focus = ({active}) => <svg width="23" height="23" viewBox="0 0 24 24" strokeWidth={active?2:1.7} {...S}><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.5"/></svg>;
  const Tag = ({active}) => <svg width="23" height="23" viewBox="0 0 24 24" strokeWidth={active?2:1.7} {...S}><path d="M4 13l7-7 9 9-7 7-9-9z"/><circle cx="9" cy="9" r="1.3"/></svg>;
  const List = ({active}) => <svg width="23" height="23" viewBox="0 0 24 24" strokeWidth={active?2:1.7} {...S}><path d="M9 7h11M9 12h11M9 17h11M4.5 7h.01M4.5 12h.01M4.5 17h.01"/></svg>;
  const Hist = ({active}) => <svg width="23" height="23" viewBox="0 0 24 24" strokeWidth={active?2:1.7} {...S}><path d="M4 12a8 8 0 1 0 2.5-5.8M4 4v3h3M12 8v4l3 2"/></svg>;

  function Demo() {
    const [tab, setTab] = React.useState('focus');
    const items = [
      { key:'focus', label:'Focus', icon: Focus },
      { key:'sell', label:'Sell It', icon: Tag },
      { key:'tasks', label:'Tasks', icon: List },
      { key:'retro', label:'Looking back', icon: Hist },
    ];
    return (
      <div className="surface">
        <div className="filler">Active: {tab}</div>
        <TabBar items={items} active={tab} onChange={setTab} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
