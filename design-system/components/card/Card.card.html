<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--paper); padding: 26px; display: flex; gap: 18px; align-items: flex-start; }
  .col { flex: 1; }
  .hair + .hair { position: relative; }
  .hair + .hair::before { content: ''; position: absolute; top: 0; left: 18px; right: 18px; height: 1px; background: var(--border-soft); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body class="bp">
<div id="root" style="display:flex;gap:18px;width:100%"></div>
<script type="text/babel">
  const __ns = (name) => { for (const k of Object.keys(window)) { try { const v = window[k]; if (v && typeof v === 'object' && v[name]) return v; } catch(e){} } return {}; };
  const _b = __ns('Card');
  const { Card, CardRow } = _b;
  const { StatusChip } = __ns('StatusChip');
  ReactDOM.createRoot(document.getElementById('root')).render(
    <React.Fragment>
      <div className="col">
        <Card>
          <div className="bp-kicker" style={{marginBottom:8}}>From your backpack</div>
          <p style={{margin:0,fontFamily:'var(--font-serif)',fontStyle:'italic',fontSize:16,lineHeight:1.5,color:'var(--ink-600)'}}>
            “I want to carry less into the next chapter.”
          </p>
        </Card>
      </div>
      <div className="col">
        <Card rows>
          <div className="hair"><CardRow>
            <span style={{flex:1,fontWeight:700,color:'var(--ink-900)'}}>Photograph 5 items</span>
            <StatusChip tone="ready">Ready</StatusChip>
          </CardRow></div>
          <div className="hair"><CardRow>
            <span style={{flex:1,fontWeight:700,color:'var(--ink-900)'}}>Contact PM</span>
            <StatusChip tone="waiting">Waiting</StatusChip>
          </CardRow></div>
        </Card>
      </div>
    </React.Fragment>
  );

</body>
</html>
